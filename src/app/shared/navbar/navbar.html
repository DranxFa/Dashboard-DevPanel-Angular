<aside class="fixed top-0 left-0 h-screen w-64 bg-gray-900 text-white flex flex-col">
  
  <div class="p-6 border-b border-gray-700">
    <h1 class="text-xl font-bold text-blue-400">DevPanel</h1>
    <p class="text-xs text-gray-400 mt-1">Admin Dashboard</p>
  </div>

  <nav class="flex-1 p-4">
    <ul class="space-y-2">
      @for (enlace of enlaces; track enlace.ruta) {
        <li>
          <a 
            [routerLink]="enlace.ruta"
            routerLinkActive="bg-blue-500"
            [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 transition-colors"
          >
            <span>{{ enlace.icon }}</span>
            <span>{{ enlace.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="p-4 border-t border-gray-700 text-xs text-gray-400">
    Angular
  </div>

</aside>
